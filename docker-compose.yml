services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: policystrata
      POSTGRES_PASSWORD: policystrata
      POSTGRES_DB: support_saas
    ports:
      - "${POLICYSTRATA_POSTGRES_PORT:-55432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U policystrata -d support_saas"]
      interval: 3s
      timeout: 3s
      retries: 20
  clickhouse:
    image: clickhouse/clickhouse-server:25.6
    environment:
      CLICKHOUSE_DB: policystrata
      CLICKHOUSE_USER: policystrata
      CLICKHOUSE_PASSWORD: policystrata
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    ports:
      - "${POLICYSTRATA_CLICKHOUSE_HTTP_PORT:-8123}:8123"
      - "${POLICYSTRATA_CLICKHOUSE_NATIVE_PORT:-9000}:9000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8123/ping | grep -q Ok"]
      interval: 3s
      timeout: 3s
      retries: 20
