name: Publish

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@e58605a9b6da7c637471fab8847a5e5a6b8df081
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --extra dev --frozen

      - name: Run tests
        run: uv run pytest

      - name: Run lint
        run: uv run ruff check .

      - name: Run type checks
        run: uv run mypy src

      - name: Check PyPI publish uses a version tag
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          case "$GITHUB_REF" in
            refs/tags/v*) ;;
            *)
              echo "PyPI publishing must be manually dispatched from a v* tag, got $GITHUB_REF" >&2
              exit 1
              ;;
          esac

      - name: Check release tag matches package version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          package_version="$(uv run python -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")"
          tag_version="${GITHUB_REF_NAME#v}"
          if [ "$tag_version" != "$package_version" ]; then
            echo "Tag $GITHUB_REF_NAME does not match package version $package_version" >&2
            exit 1
          fi

      - name: Build source distribution and wheel
        run: uv build

      - name: Check distribution metadata
        run: uv run --frozen twine check --strict dist/*

      - name: Record distribution checksums
        run: |
          cd dist
          sha256sum *.tar.gz *.whl > SHA256SUMS

      - name: Store distribution packages
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: python-package-distributions
          path: |
            dist/*.tar.gz
            dist/*.whl

      - name: Store distribution checksums
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: python-package-checksums
          path: dist/SHA256SUMS

  publish-pypi:
    name: Publish to PyPI
    needs: build
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/policystrata
    permissions:
      id-token: write

    steps:
      - name: Download distribution packages
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: python-package-distributions
          path: dist/

      - name: Download distribution checksums
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: python-package-checksums
          path: dist/

      - name: Verify distribution checksums
        run: |
          cd dist
          sha256sum --check SHA256SUMS
          rm SHA256SUMS

      - name: Publish distribution to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b
