name: Publish

on:
  workflow_dispatch:
    inputs:
      publish_pypi:
        description: "Publish the Python package to PyPI"
        required: true
        default: true
        type: boolean
      publish_npm:
        description: "Publish the Node package to npm"
        required: true
        default: false
        type: boolean
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-python:
    name: Build Python distribution
    runs-on: ubuntu-24.04

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
        with:
          enable-cache: true
          cache-suffix: publish-py-3.12

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --extra dev --frozen

      - name: Run tests
        run: uv run pytest

      - name: Run lint
        run: uv run ruff check .

      - name: Run type checks
        run: uv run mypy src

      - name: Check publishing uses a version tag
        if: ${{ github.event_name == 'workflow_dispatch' && (inputs.publish_pypi || inputs.publish_npm) }}
        run: |
          case "$GITHUB_REF" in
            refs/tags/v*) ;;
            *)
              echo "Publishing must be manually dispatched from a v* tag, got $GITHUB_REF" >&2
              exit 1
              ;;
          esac

      - name: Check release tag matches package version
        if: ${{ startsWith(github.ref, 'refs/tags/') && (github.event_name != 'workflow_dispatch' || inputs.publish_pypi) }}
        run: |
          package_version="$(uv run python -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")"
          tag_version="${GITHUB_REF_NAME#v}"
          if [ "$tag_version" != "$package_version" ]; then
            echo "Tag $GITHUB_REF_NAME does not match package version $package_version" >&2
            exit 1
          fi

      - name: Build source distribution and wheel
        run: uv build

      - name: Check distribution metadata
        run: uv run --frozen twine check --strict dist/*

      - name: Record distribution checksums
        run: |
          cd dist
          sha256sum *.tar.gz *.whl > SHA256SUMS

      - name: Store distribution packages
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: python-package-distributions
          path: |
            dist/*.tar.gz
            dist/*.whl

      - name: Store distribution checksums
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: python-package-checksums
          path: dist/SHA256SUMS

  build-node:
    name: Build Node distribution
    runs-on: ubuntu-24.04

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Check npm publish uses a version tag
        run: |
          case "$GITHUB_REF" in
            refs/tags/v*) ;;
            *)
              echo "npm publishing must be manually dispatched from a v* tag, got $GITHUB_REF" >&2
              exit 1
              ;;
          esac

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "24"
          package-manager-cache: false

      - name: Install package dependencies
        run: npm ci --workspace packages/node

      - name: Run Node SDK tests
        run: npm test --workspace packages/node

      - name: Verify Node SDK package contents
        working-directory: packages/node
        run: npm pack --dry-run

  publish-pypi:
    name: Publish to PyPI
    needs: build-python
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_pypi }}
    runs-on: ubuntu-24.04
    environment:
      name: pypi
      url: https://pypi.org/p/policystrata
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
        with:
          enable-cache: false
          ignore-empty-workdir: true

      - name: Download distribution packages
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: python-package-distributions
          path: dist/

      - name: Download distribution checksums
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: python-package-checksums
          path: dist/

      - name: Verify distribution checksums
        run: |
          cd dist
          sha256sum --check SHA256SUMS
          rm SHA256SUMS

      - name: Publish distribution to PyPI
        run: uv publish dist/*

  publish-npm:
    name: Publish to npm
    needs: build-node
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_npm }}
    runs-on: ubuntu-24.04
    environment:
      name: npm
      url: https://www.npmjs.com/package/policystrata
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Install package dependencies
        run: npm ci --workspace packages/node

      - name: Run Node SDK tests
        run: npm test --workspace packages/node

      - name: Verify Node SDK package contents
        working-directory: packages/node
        run: npm pack --dry-run

      - name: Check Node package version is unpublished
        run: |
          package_name="$(node -p "require('./packages/node/package.json').name")"
          package_version="$(node -p "require('./packages/node/package.json').version")"
          if npm view "${package_name}@${package_version}" version >/dev/null 2>&1; then
            echo "${package_name}@${package_version} already exists on npm" >&2
            exit 1
          fi

      - name: Publish Node package to npm
        working-directory: packages/node
        run: npm publish --provenance
