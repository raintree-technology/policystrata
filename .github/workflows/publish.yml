name: Publish

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --extra dev --frozen

      - name: Run tests
        run: uv run pytest

      - name: Run lint
        run: uv run ruff check .

      - name: Run type checks
        run: uv run mypy src

      - name: Check PyPI publish uses a version tag
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          case "$GITHUB_REF" in
            refs/tags/v*) ;;
            *)
              echo "PyPI publishing must be manually dispatched from a v* tag, got $GITHUB_REF" >&2
              exit 1
              ;;
          esac

      - name: Check release tag matches package version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          package_version="$(uv run python -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")"
          tag_version="${GITHUB_REF_NAME#v}"
          if [ "$tag_version" != "$package_version" ]; then
            echo "Tag $GITHUB_REF_NAME does not match package version $package_version" >&2
            exit 1
          fi

      - name: Build source distribution and wheel
        run: uv build

      - name: Check distribution metadata
        run: uv run --frozen twine check --strict dist/*

      - name: Record distribution checksums
        run: |
          cd dist
          sha256sum *.tar.gz *.whl > SHA256SUMS

      - name: Store distribution packages
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: python-package-distributions
          path: |
            dist/*.tar.gz
            dist/*.whl

      - name: Store distribution checksums
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: python-package-checksums
          path: dist/SHA256SUMS

  publish-pypi:
    name: Publish to PyPI
    needs: build
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/policystrata
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
        with:
          enable-cache: false
          ignore-empty-workdir: true

      - name: Download distribution packages
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: python-package-distributions
          path: dist/

      - name: Download distribution checksums
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: python-package-checksums
          path: dist/

      - name: Verify distribution checksums
        run: |
          cd dist
          sha256sum --check SHA256SUMS
          rm SHA256SUMS

      - name: Publish distribution to PyPI
        run: uv publish dist/*
