versions:
  manifest: v3
  grammar: v3
  validator: v3
  compiler: v3
  database: v3
  release: v3
contracts:
  manifest:
    mode: capability_exposure
    responsibilities:
      - expose_model_visible_finance_metrics_and_dimensions
      - omit_restricted_household_fields_and_retired_aliases
    emits_obligations:
      - capability_scope
  grammar:
    mode: intent_space
    responsibilities:
      - parse_declared_finance_analytics_intents
      - preserve_untrusted_intent_for_validation
      - avoid_advertising_capabilities_outside_manifest_scope
    accepts_obligations:
      - capability_scope
    emits_obligations:
      - syntactic_intent
  validator:
    mode: semantic_validation
    responsibilities:
      - authorize_metric_dimension_time_and_budget
      - bind_principal_firm_scope
      - deny_sensitive_household_identifiers_for_advisors
    accepts_obligations:
      - syntactic_intent
    emits_obligations:
      - authorization_decision
      - metric_semantics
      - tenant_scope
      - row_budget
  compiler:
    mode: sql_lowering
    responsibilities:
      - preserve_authorized_metric_semantics
      - preserve_firm_scope_predicates
      - preserve_fiscal_time_semantics
      - preserve_row_budget
    accepts_obligations:
      - authorization_decision
      - metric_semantics
      - tenant_scope
      - row_budget
    emits_obligations:
      - sql_semantics
      - database_containment_request
  database:
    mode: database_containment
    responsibilities:
      - enforce_firm_isolation_rls
      - contain_cross_firm_row_access
    accepts_obligations:
      - database_containment_request
    emits_obligations:
      - row_access_result
  release:
    mode: output_release
    responsibilities:
      - enforce_release_decision
      - withhold_contained_or_unauthorized_results
    accepts_obligations:
      - authorization_decision
      - row_access_result
transition_obligations:
  - capability_scope
  - syntactic_intent
  - authorization_decision
  - metric_semantics
  - tenant_scope
  - row_budget
  - sql_semantics
  - database_containment_request
  - row_access_result
